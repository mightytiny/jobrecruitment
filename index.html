<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://xhgkcydmnydtnykjkoun.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KarKhmer</title>
<meta name="description" content="Connecting Cambodian talent with opportunity — jobs and workers across Cambodia.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2826">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KarKhmer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Noto+Sans+Khmer:wght@400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-lang="km">

<header><div class="wrap bar">
  <div class="logo" data-go="home">Kar<span>Khmer</span></div>
  <nav>
    <button data-go="home" class="active" data-t="nav_home"></button>
    <button data-go="jobs" data-t="nav_jobs"></button>
    <button data-go="workers" data-t="nav_workers"></button>
    <button data-go="postjob" class="nav-post" data-t="nav_post_job"></button>
  </nav>
  <div class="rt">
    <div class="auth" id="auth_area"></div>
    <div class="lang">
      <button data-lang="km" class="active">ខ្មែរ</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</div></header>

<main class="wrap">

  <!-- HOME -->
  <section id="home" class="page show">
    <div class="hero">
      <div class="hero-content">
        <span class="eyebrow" data-t="eyebrow"></span>
        <h1 data-t="hero_h"></h1>
        <p data-t="hero_p"></p>
        <div class="hero-search">
          <input type="text" id="home_kw" data-t-ph="f_keyword">
          <select id="home_cat"></select>
          <button class="btn amber" id="home_search_btn" data-t="home_search_btn"></button>
        </div>
        <p class="hero-seeker-cta">
          <span data-t="home_seeker_cta"></span>
          <button data-go="signup" data-t="home_seeker_link"></button>
        </p>
      </div>
    </div>
    <div class="home-section">
      <div class="home-section-head">
        <h2 data-t="home_latest_jobs"></h2>
        <button class="see-all-btn" data-go="jobs" data-t="home_see_all"></button>
      </div>
      <div class="home-jobs-grid" id="home_jobs_grid"></div>
    </div>
  </section>

  <!-- LOGIN -->
  <section id="login" class="page">
    <h2 data-t="login_h"></h2>
    <p class="sub" data-t="login_sub"></p>
    <div class="form auth-form">
      <label for="li_email" data-t="f_email"></label>
      <input id="li_email" type="email" maxlength="120" autocomplete="email" required>
      <label for="li_pw" data-t="f_password"></label>
      <input id="li_pw" type="password" maxlength="120" autocomplete="current-password" required>
      <button class="btn" data-auth="login" data-t="f_login_btn"></button>
      <div class="auth-alt">
        <button class="alt-link" data-go="signup" data-t="login_alt"></button>
        <button class="alt-link" data-go="forgot" data-t="login_forgot"></button>
      </div>
      <div class="err" id="li_err"></div>
    </div>
  </section>

  <!-- SIGNUP -->
  <section id="signup" class="page">
    <h2 data-t="signup_h"></h2>
    <p class="sub" data-t="signup_sub"></p>
    <div class="form auth-form">
      <div class="role-pick">
        <span class="role-label" data-t="role_q"></span>
        <div class="role-opts">
          <label class="role-opt"><input type="radio" name="su_role" value="seeker" checked><span data-t="role_seeker"></span></label>
          <label class="role-opt"><input type="radio" name="su_role" value="employer"><span data-t="role_employer"></span></label>
        </div>
      </div>
      <div id="su_co_wrap" style="display:none">
        <label for="su_co" data-t="f_company"></label>
        <input id="su_co" type="text" maxlength="120" autocomplete="organization" required>
      </div>
      <label for="su_email" data-t="f_email"></label>
      <input id="su_email" type="email" maxlength="120" autocomplete="email" required>
      <label for="su_pw" data-t="f_password"></label>
      <input id="su_pw" type="password" maxlength="120" minlength="8" autocomplete="new-password" required>
      <label for="su_pw2" data-t="f_password_confirm"></label>
      <input id="su_pw2" type="password" maxlength="120" minlength="8" autocomplete="new-password" required>
      <button class="btn amber" data-auth="signup" data-t="f_signup_btn"></button>
      <button class="alt-link" data-go="login" data-t="signup_alt"></button>
      <div class="err" id="su_err"></div>
    </div>
  </section>

  <!-- VERIFY EMAIL NOTICE -->
  <section id="verify" class="page">
    <h2 data-t="verify_h"></h2>
    <p class="sub" id="verify_msg"></p>
    <div class="form notice">
      <p data-t="verify_help"></p>
    </div>
  </section>

  <!-- FORGOT PASSWORD -->
  <section id="forgot" class="page">
    <h2 data-t="forgot_h"></h2>
    <p class="sub" data-t="forgot_sub"></p>
    <div class="form auth-form">
      <label for="fp_email" data-t="f_email"></label>
      <input id="fp_email" type="email" maxlength="120" autocomplete="email" required>
      <button class="btn" data-auth="forgot" data-t="forgot_btn"></button>
      <button class="alt-link" data-go="login" data-t="forgot_back"></button>
      <div class="ok" id="fp_ok" data-t="forgot_sent"></div>
      <div class="err" id="fp_err"></div>
    </div>
  </section>

  <!-- RESET PASSWORD -->
  <section id="reset" class="page">
    <h2 data-t="reset_h"></h2>
    <p class="sub" data-t="reset_sub"></p>
    <div class="form auth-form">
      <label for="rp_pw" data-t="f_password"></label>
      <input id="rp_pw" type="password" maxlength="120" minlength="8" autocomplete="new-password" required>
      <label for="rp_pw2" data-t="f_password_confirm"></label>
      <input id="rp_pw2" type="password" maxlength="120" minlength="8" autocomplete="new-password" required>
      <button class="btn amber" data-auth="reset" data-t="reset_btn"></button>
      <div class="ok" id="rp_ok" data-t="reset_done"></div>
      <div class="err" id="rp_err"></div>
    </div>
  </section>

  <!-- PROFILE -->
  <section id="myposts" class="page">
    <h2 data-t="myposts_h"></h2>
    <p class="sub" data-t="myposts_sub"></p>

    <div class="info-banner" id="need_company_banner"><span data-t="need_company"></span></div>
    <div class="info-banner" id="need_seeker_banner"><span data-t="need_seeker_profile"></span></div>

    <div id="account_emp_section" style="display:none">
      <h3 class="section-h" id="account_section_h"></h3>
      <div class="form account-form">
        <p class="form-hint" id="ap_hint" data-t="create_company_inline"></p>
        <div class="grid2">
          <div><label for="ap_co" data-t="f_company"></label><input id="ap_co" type="text" maxlength="100" required></div>
          <div><label for="ap_contact" data-t="f_contact_name"></label><input id="ap_contact" type="text" maxlength="100"></div>
        </div>
        <div class="grid2">
          <div><label for="ap_phone" data-t="f_phone"></label><input id="ap_phone" type="tel" maxlength="20" required></div>
          <div><label for="ap_email" data-t="f_email"></label><input id="ap_email" type="email" maxlength="120" readonly required><small class="field-note" data-t="f_email_note"></small></div>
        </div>
        <div class="grid2">
          <div><label for="ap_telegram" data-t="f_telegram"></label><input id="ap_telegram" type="tel" maxlength="20" placeholder="+855..."></div>
          <div><label for="ap_industry" data-t="f_industry"></label><input id="ap_industry" type="text" maxlength="80"></div>
        </div>
        <div class="grid2">
          <div><label for="ap_location" data-t="f_location"></label><input id="ap_location" type="text" maxlength="120"></div>
          <div><label for="ap_website" data-t="f_website"></label><input id="ap_website" type="url" maxlength="200" placeholder="https://"></div>
        </div>
        <button class="btn" data-save="account-emp" data-t="btn_save"></button>
        <div class="ok" id="ap_ok" data-t="saved"></div>
        <div class="err" id="ap_err"></div>
      </div>
    </div>

    <div id="account_seeker_section" style="display:none">
      <h3 class="section-h" id="account_seeker_h" data-t="section_account_self"></h3>
      <div class="form account-form">
        <p class="form-hint" id="aps_hint" data-t="no_account_seeker"></p>
        <div class="grid2">
          <div><label for="aps_name" data-t="f_name"></label><input id="aps_name" type="text" maxlength="100" required></div>
          <div><label for="aps_phone" data-t="f_phone"></label><input id="aps_phone" type="tel" maxlength="20" required></div>
        </div>
        <div class="grid2">
          <div><label for="aps_email" data-t="f_email"></label><input id="aps_email" type="email" maxlength="120" readonly required><small class="field-note" data-t="f_email_note"></small></div>
          <div><label for="aps_telegram" data-t="f_telegram"></label><input id="aps_telegram" type="tel" maxlength="20" placeholder="+855..."></div>
        </div>
        <button class="btn" data-save="account-seeker" data-t="btn_save"></button>
        <div class="ok" id="aps_ok" data-t="saved"></div>
        <div class="err" id="aps_err"></div>
      </div>
    </div>

    <div id="mp_content"></div>

    <div class="account-email-zone" id="account_email_zone" hidden>
      <p class="account-email-info"><span data-t="change_email_info"></span> <strong id="account_email_current"></strong></p>
      <button class="btn-sm" id="change_email_btn" data-t="change_email_btn"></button>
      <div class="change-email-form" id="change_email_form" hidden>
        <label for="ce_email" data-t="change_email_label"></label>
        <input id="ce_email" type="email" maxlength="120" autocomplete="email" placeholder="name@example.com">
        <div class="ce-actions">
          <button class="btn-sm" id="ce_submit" data-t="change_email_send"></button>
          <button class="btn-sm" id="ce_cancel" data-t="btn_cancel"></button>
        </div>
        <div class="ok" id="ce_ok" data-t="change_email_sent"></div>
        <div class="err" id="ce_err"></div>
      </div>
    </div>

    <div class="switch-role-zone" id="switch_role_zone" hidden>
      <p class="switch-role-info" id="switch_role_info"></p>
      <button class="btn-sm" id="switch_role_btn"></button>
      <div class="err" id="switch_role_err"></div>
    </div>

    <div class="logout-zone">
      <button class="btn-sm" id="profile_logout_btn" data-t="nav_logout"></button>
    </div>

    <div class="danger-zone" id="danger_zone" hidden>
      <p class="danger-warn" id="danger_warn"></p>
      <button class="btn-sm danger solid" id="del_profile_btn"></button>
    </div>
  </section>

  <!-- SEEKER SIGNUP -->
  <section id="seeker" class="page">
    <h2 data-t="seeker_h"></h2>
    <p class="sub" data-t="seeker_sub"></p>
    <div class="edit-banner" id="s_edit_banner"><span data-t="edit_profile_h"></span><button class="link-btn" data-cancel="seeker" data-t="btn_cancel"></button></div>
    <div class="form">
      <label for="s_title" data-t="f_seek_title"></label>
      <input id="s_title" type="text" maxlength="120">
      <div class="grid2">
        <div><label for="s_cat" data-t="f_cat"></label><select id="s_cat"></select></div>
        <div><label for="s_prov" data-t="f_prov"></label><select id="s_prov"></select></div>
      </div>
      <div class="grid2">
        <div><label for="s_exp" data-t="f_exp"></label><select id="s_exp"></select></div>
        <div><label for="s_sal" data-t="f_esal"></label><input id="s_sal" type="number" min="0" max="100000"></div>
      </div>
      <label for="s_bio" data-t="f_skills"></label><textarea id="s_bio" maxlength="1000"></textarea>
      <button class="btn" data-save="seeker" data-t="f_submit"></button>
      <div class="ok" id="s_ok" data-t="saved"></div>
      <div class="err" id="s_err"></div>
    </div>
  </section>

  <!-- EMPLOYER + JOB POST -->
  <section id="employer" class="page">
    <h2 data-t="emp_h"></h2>
    <p class="sub" data-t="emp_sub"></p>
    <div class="edit-banner" id="e_edit_banner"><span data-t="edit_job_h"></span><button class="link-btn" data-cancel="employer" data-t="btn_cancel"></button></div>
    <div class="form">
      <label for="e_title" data-t="f_title"></label>
      <input id="e_title" type="text" maxlength="120" required>
      <div class="grid2">
        <div><label for="e_cat" data-t="f_cat"></label><select id="e_cat"></select></div>
        <div><label for="e_prov" data-t="f_prov"></label><select id="e_prov"></select></div>
      </div>
      <div class="grid2">
        <div><label for="e_type" data-t="f_type"></label><select id="e_type"></select></div>
        <div></div>
      </div>
      <div class="grid2">
        <div><label for="e_smin" data-t="f_smin"></label><input id="e_smin" type="number" min="0" max="100000"></div>
        <div><label for="e_smax" data-t="f_smax"></label><input id="e_smax" type="number" min="0" max="100000"></div>
      </div>
      <label for="e_desc" data-t="f_desc"></label><textarea id="e_desc" maxlength="2000"></textarea>
      <button class="btn amber" data-save="employer" data-t="f_post"></button>
      <div class="ok" id="e_ok" data-t="posted"></div>
      <div class="err" id="e_err"></div>
    </div>
  </section>

  <!-- JOB DETAIL -->
  <section id="jobdetail" class="page">
    <button class="back-btn" data-go="jobs" data-t="back_to_jobs"></button>
    <div class="detail-wrap">
      <h2 id="jd_title"></h2>
      <div class="detail-meta" id="jd_meta"></div>
      <div class="detail-tags" id="jd_tags"></div>
      <div class="detail-age" id="jd_age"></div>
      <h3 class="detail-section-h" data-t="job_description"></h3>
      <div class="detail-desc" id="jd_desc"></div>
      <h3 class="detail-section-h" data-t="contact"></h3>
      <div class="detail-contact" id="jd_contact"></div>
      <div class="detail-foot">
        <button class="share-btn" data-share="job">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
          <span data-t="share_btn"></span>
        </button>
        <div class="detail-foot-nav">
          <button class="back-link" data-go="jobs" data-t="back_to_jobs"></button>
          <button class="report-btn" data-report-job="" data-t="report_btn"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- SEARCH JOBS -->
  <section id="jobs" class="page">
    <h2 data-t="jobs_h"></h2>
    <p class="sub" data-t="jobs_sub"></p>
    <div class="filters">
      <div><div class="label" data-t="f_keyword"></div><input id="j_kw"></div>
      <div><div class="label" data-t="f_cat"></div><select id="j_cat"></select></div>
      <div><div class="label" data-t="f_prov"></div><select id="j_prov"></select></div>
    </div>
    <div class="view-controls">
      <div class="view-toggle-btns">
        <button id="j_view_cards" class="view-toggle-btn active" aria-label="Card view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button id="j_view_list" class="view-toggle-btn" aria-label="List view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="2" width="14" height="2.5" rx="1"/><rect x="1" y="6.75" width="14" height="2.5" rx="1"/><rect x="1" y="11.5" width="14" height="2.5" rx="1"/></svg>
        </button>
      </div>
      <select id="j_sort" aria-label="Sort jobs"></select>
    </div>
    <div class="result-count" id="j_count" aria-live="polite"></div>
    <div class="cards" id="j_results"></div>
  </section>

  <!-- WORKER DETAIL -->
  <section id="seekerdetail" class="page">
    <button class="back-btn" data-go="workers" data-t="back_to_workers"></button>
    <div class="detail-wrap">
      <h2 id="sd_title"></h2>
      <div class="detail-tags" id="sd_tags"></div>
      <div class="detail-age" id="sd_age"></div>
      <h3 class="detail-section-h" data-t="f_skills"></h3>
      <div class="detail-desc" id="sd_bio"></div>
      <h3 class="detail-section-h" data-t="contact"></h3>
      <div class="detail-contact" id="sd_contact"></div>
      <div class="detail-foot">
        <div class="detail-foot-nav">
          <button class="back-link" data-go="workers" data-t="back_to_workers"></button>
          <button class="report-btn" data-report-seeker="" data-t="report_btn"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- SEARCH WORKERS -->
  <section id="workers" class="page">
    <h2 data-t="workers_h"></h2>
    <p class="sub" data-t="workers_sub"></p>
    <div class="filters">
      <div><div class="label" data-t="f_keyword"></div><input id="w_kw"></div>
      <div><div class="label" data-t="f_cat"></div><select id="w_cat"></select></div>
      <div><div class="label" data-t="f_prov"></div><select id="w_prov"></select></div>
      <div><div class="label" data-t="f_exp"></div><select id="w_exp"></select></div>
    </div>
    <div class="view-controls">
      <div class="view-toggle-btns">
        <button id="w_view_cards" class="view-toggle-btn active" aria-label="Card view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button id="w_view_list" class="view-toggle-btn" aria-label="List view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="2" width="14" height="2.5" rx="1"/><rect x="1" y="6.75" width="14" height="2.5" rx="1"/><rect x="1" y="11.5" width="14" height="2.5" rx="1"/></svg>
        </button>
      </div>
      <select id="w_sort" aria-label="Sort workers"></select>
    </div>
    <div class="result-count" id="w_count" aria-live="polite"></div>
    <div class="cards" id="w_results"></div>
  </section>

</main>
<footer><div class="wrap" data-t="footer"></div></footer>

<div class="modal-backdrop" id="modal_root" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal_title">
    <h3 id="modal_title" class="modal-h"></h3>
    <p class="modal-body" id="modal_msg"></p>
    <div class="modal-actions">
      <button class="btn-sm" id="modal_cancel"></button>
      <button class="btn-sm danger solid" id="modal_ok"></button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="share_root" hidden>
  <div class="modal share-sheet" role="dialog" aria-modal="true" aria-labelledby="share_title">
    <h3 id="share_title" class="modal-h" data-t="share_sheet_h"></h3>
    <div class="share-grid" id="share_grid"></div>
    <div class="share-copy-row">
      <input id="share_url" type="text" readonly aria-label="Link">
      <button class="btn-sm" id="share_copy" data-t="share_copy"></button>
    </div>
    <div class="modal-actions">
      <button class="btn-sm" id="share_close" data-t="btn_cancel"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js"
        integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL"
        crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
